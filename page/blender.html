<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projet Blender - Maison 3D</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f7f9fc;
      color: #1f2937;
    }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }


    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid #ddd;
      z-index: 1000;
    }
    .nav-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }
    .logo { font-weight: bold; font-size: 1.5rem; color: #7548a8; }
    .nav-links { list-style: none; display: flex; gap: 1.5rem; }
    .nav-links a { color: #1f2937; font-weight: 500; transition: 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: #f59e0b; }
    .menu-toggle { display: none; flex-direction: column; cursor: pointer; gap: 4px; }
    .menu-toggle span { width: 25px; height: 3px; background: #1f2937; border-radius: 2px; }
    @media (max-width: 768px) {
      .nav-links { display: none; flex-direction: column; background: rgba(0,0,0,0.8); position: absolute; top: 60px; right: 0; width: 200px; padding: 1rem; border-radius: 8px; }
      .nav-links.show { display: flex; }
      .nav-links a { color: white; }
      .menu-toggle { display: flex; }
    }

    main { padding-top: 80px; text-align: center; }

    .project-container {
      max-width: 900px;
      margin: 50px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }

    .project-container h2 { font-size: 2rem; color: #7548a8; margin-bottom: 20px; }
    .project-container p { margin-bottom: 20px; font-size: 1rem; color: #4a4a6a; }

    video, iframe {
      width: 100%;
      border-radius: 16px;
      border: 3px solid #0066ff;
      max-height: 500px;
    }
.video {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

.video-btn {
  display: inline-block;
  padding: 14px 28px;
  background: linear-gradient(135deg, #7548a8, #9f67ff);
  color: white;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(117, 72, 168, 0.3);
  transition: all 0.3s ease;
}

.video-btn:hover {
  background: linear-gradient(135deg, #5b3691, #7e4ce0);
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 12px 25px rgba(117, 72, 168, 0.4);
}

.video-btn:active {
  transform: scale(0.98);
}
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">Portfolio</div>
      <ul class="nav-links">
        <li><a href="../index.html" class="nav-link">Accueil</a></li>
        <li><a href="parcours.html" class="nav-link">Parcours</a></li>
        <li><a href="projets.html" class="nav-link active">Projets</a></li>
        <li><a href="stages.html" class="nav-link">Stages</a></li>
        <li><a href="competance.html" class="nav-link">Compétences</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <div class="project-container">
      <h2>Maison 3D - Projet Blender</h2>
      <p>Visualisation 3D de la maison que j’ai modélisée dans Blender.</p>
      

    <div class="video">
  <a href="https://drive.google.com/file/d/1_XLvfcMDC9pGShSGUNFPLSrLmWrlRovC/view?usp=drive_link" target="_blank" class="video-btn">
    ▶ Voir la démonstration du projet
  </a>
</div>


    </div>
  </main>

  <script>
    const toggle = document.getElementById("menuToggle");
    const nav = document.querySelector(".nav-links");
    toggle.onclick = () => nav.classList.toggle("show");
  </script>
</body>
</html>
